name: functions

on:
  push:
    branches: [main]
    paths:
      - "functions/**"
      - ".github/workflows/functions.yml"
  pull_request:
    branches: [main]
    paths:
      - "functions/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci

      - run: npm run build

      - name: Azure login (OIDC)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: functions
          sku: flexconsumption

      # functions-action injects an empty-key AzureWebJobsStorage app setting
      # which breaks identity-based access. Remove it after every deploy.
      - name: Strip injected AzureWebJobsStorage (identity-based config)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          az functionapp config appsettings delete \
            -g ${{ vars.AZURE_RESOURCE_GROUP }} \
            -n ${{ vars.AZURE_FUNCTIONAPP_NAME }} \
            --setting-names AzureWebJobsStorage \
            -o none
          az functionapp restart \
            -g ${{ vars.AZURE_RESOURCE_GROUP }} \
            -n ${{ vars.AZURE_FUNCTIONAPP_NAME }} \
            -o none
